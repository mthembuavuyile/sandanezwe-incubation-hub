<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sandanezwe Incubation Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages.css">
    <script src="js/script.js" defer></script>
</head>
<body class="internal-page">

    <div id="nav-placeholder"></div>

    <section class="contact-wrapper bg-light">
        <div class="container">
            <div class="contact-grid">
                
                <div class="contact-info-section">
                    <h2 class="section-title">Let's Get In Touch</h2>
                    <p class="contact-subtitle">Have a question or want to work together? We'd love to hear from you. Fill out the form or reach out directly.</p>
                    
                    <div class="info-list">
                        <div class="info-item">
                            <div class="icon-circle"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="info-text">
                                <h3>Location</h3>
                                <p>Sandanezwe, KwaZulu-Natal, South Africa</p>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="icon-circle"><i class="fas fa-phone-alt"></i></div>
                            <div class="info-text">
                                <h3>Phone</h3>
                                <p><a href="tel:+27712345678">071 234 5678</a></p>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="icon-circle"><i class="fas fa-envelope"></i></div>
                            <div class="info-text">
                                <h3>Email</h3>
                                <p><a href="mailto:info@sinchub.co.za">info@sinchub.co.za</a></p>
                            </div>
                        </div>
                    </div>

                    <div class="social-links">
                        <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>

                <div class="contact-form-section">
                    <div class="contact-card">
                        <form action="#" method="POST" class="modern-form">
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" name="name" placeholder="e.g. John Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="e.g. john@example.com" required>
                            </div>
                            <div class="form-group">
                                <label for="subject">Subject</label>
                                <input type="text" id="subject" name="subject" placeholder="How can we help?" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                            </div>
                            <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

</body>
</html>
